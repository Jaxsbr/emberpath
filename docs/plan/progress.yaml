# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: fog-marsh-dead-end
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 3
  next_task: "[US-66] Implement: (a) src/data/areas/types.ts — extend TriggerDefinition with optional `setFlags?: Record<string, string | number | boolean>` (mirrors DialogueChoice.setFlags shape at line 23; additive; ordering: insert AFTER condition?, BEFORE repeatable). (b) src/systems/triggerZone.ts — in tryFire, AFTER the one-shot setFlag bookkeeping (line 72) and BEFORE the type-dispatch switch (line 76), iterate `trigger.setFlags ?? {}` calling setFlag(key,value) for each entry. Existing imports already cover setFlag. (c) src/data/areas/fog-marsh.ts — append a new trigger to the triggers array: { id: 'marsh-deepens', col: 14, row: 5, width: 1, height: 2, type: 'thought', actionRef: 'The fog rolls in behind me. The path is gone.', repeatable: false, setFlags: { marsh_trapped: true } }. Verify: npx tsc --noEmit && npm run build pass; cd tools/editor && npm run build passes (incidental — schema add is a typescript-passive shape extension; editor inspects condition + repeatable already)."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
