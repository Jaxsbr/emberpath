# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 12
  next_task: "[US-65] Implement URL-param reset + manual-verify doc + AGENTS.md updates. (a) TitleScene.applyUrlReset() called first in create(): parse URLSearchParams from window.location.search; if reset==='1' → resetWorld + info log; if clearSave==='1' → clearSave + info log; in either case delete the consumed params and history.replaceState to clean the URL while preserving others; both-together processes both wipes. (b) Create docs/plan/save-resume-manual-verify.md mirroring world-legibility-manual-verify.md: Setup; Reads-as observer (Continue + Reset); Per-area resume checklist (Ashen Isle / Fog Marsh × walk / transition / dialogue close / StoryScene close); Mid-edge cases; Reset mechanism (button + ?reset=1 + ?clearSave=1 + both); Error paths (corrupt / tampered / wrong-version / unknown areaId / private mode / quota / out-of-bounds / WALL); Deploy smoke. (c) Edit AGENTS.md: Directory layout adds triggers/saveState.ts + docs/plan/save-resume-manual-verify.md; File ownership new row saveState + edits to flags/TitleScene/GameScene; Behavior rules new 'Save / resume' bullet; Controls new 'Dev / testing' subsection. Verify both builds pass."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62, US-63, US-64]
