# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: keeper-rescue
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 5
  next_task: "[US-71] Investigate: read full GameScene.renderNpcs path (line 463+) + the existing onFlagChange('marsh_trapped') subscriber wiring (lines 142-148) + cleanupResize unsub pattern (line 594+); read systems/conditions.ts for evaluateCondition surface; design the generalised spawn-condition subscriber API (per-flag onFlagChange registration parsed from regex /\\b([a-z_][a-z0-9_]*)\\s*(==|!=|>=|>|<=|<)/gi); confirm Phaser tween signature for alpha 0->1 over 500ms; identify the input-suspend mechanism (transitionInProgress equivalent) for the 1000ms post-spawn window; plan the Keeper NPC entry on fog-marsh.ts at (col 14, row 8). Produce a focused diff plan for the next implement task."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-70]
