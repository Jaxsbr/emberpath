# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 13
  next_task: "[US-65] Create docs/plan/save-resume-manual-verify.md mirroring world-legibility-manual-verify.md shape. Sections: Setup (npm run dev pointing to localhost:5173); Reads-as observer (Continue reads-as 'remembers me' and Reset reads-as 'wiped' with observer questions); Per-area resume checklist (Ashen Isle + Fog Marsh, each with throttled walk + transition flush + dialogue close + StoryScene close — for Fog Marsh only — bullets); Mid-edge cases (mid-transition close, mid-dialogue close, New Game wipes save); Reset mechanism (Reset Progress button, ?reset=1, ?clearSave=1, both-together); Error paths (corrupt JSON via DevTools, tampered shape, wrong version 2, unknown areaId, private mode, quota stuffing, out-of-bounds position, WALL-tile position); Deploy smoke (Learning #65 — refresh on jaxsbr.github.io/emberpath/ to confirm localStorage works on the deployed origin)."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62, US-63, US-64]
