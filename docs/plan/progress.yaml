# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: briar-wilds
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 14
  next_task: "[phase] Update AGENTS.md to reflect new modules + behavior rules: src/systems/emberWarmth.ts ownership row; AreaDefinition.drainZones?/quietZones? in data/areas/types.ts row; src/data/areas/briar-wilds.ts ownership row; new briar-floor / briar-thorn terrains in maps/terrain.ts row; new bramble-cluster / briar-dead-tree / twisted-root object kinds in maps/objects.ts row; new tileset entry in maps/tilesets.ts row. Add Behavior rules: 'Ember warmth state' (system, drain/restore, hard floor, visual binding, persistence); 'Drain zones' (entry/escalation, doubt voices, no collision, no fail state); 'Quiet places' (restoration, narration on first entry, tier-2 lighting, drain-overlap precedence). Update POI lighting rule with new npcWarmedRadius/Intensity absolute constants. Add east-gated exit + conditional bramble-objects to Conditional exits/decorations rule. New asset directories: assets/tilesets/briar-wilds-floor-thorn/, assets/objects/briar-wilds/."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
