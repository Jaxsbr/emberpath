# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 16
  next_task: "[phase/US-48/US-49] Doc updates. (1) AGENTS.md directory layout: add assets/tilesets/ subtree (tiny-town/, monochrome-rpg/) and src/maps/tilesets.ts entry. (2) AGENTS.md file ownership table: add row for src/maps/tilesets.ts (tileset registry + resolveFrame picker); update row for scenes/GameScene.ts to reflect sprite-based tile rendering, pixelArt config, prop rendering at depth 3; add row for data/areas/types.ts mention of PropDefinition if not present. (3) AGENTS.md behavior rules: add a new rule describing sprite-based tile rendering (per-area tileset field, spritesheet preload, nearest-neighbor via pixelArt, deterministic variant selection via resolveFrame, EXIT via tileset frame not constant, non-blocking props). (4) Create docs/plan/tileset-manual-verify.md — checklist of every manual-verify criterion from phase-goal (per-area floor variants, walls, props visible, exit reads-as dirt-path/flagstone, no console errors, fox-in-front-of-prop, crisp pixel rendering). Also note the doc's own filename matches the phase-goal reference."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
