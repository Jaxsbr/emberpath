# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: npc-behavior
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 2
  next_task: "[US-52] Copy NPC sprite assets from /Users/jacobusbrink/Jaxs/assets/emberpath/npc/{marsh-hermit,old-man}/{idle,walk,static}/ to repo-relative assets/npc/{marsh-hermit,old-man}/{idle,walk,static}/. Preserve the 8 direction subdirs for idle/walk (frame_000..003.png per dir) and the 8 <dir>.png flat files for static. Expected totals: 32 idle + 32 walk + 8 static = 72 files per NPC, 144 total. Do not touch .gitignore. Verify vite.config.ts `publicDir: 'assets'` still serves the subtree (already generic — no config change required). Verify tsc --noEmit && npm run build passes. This is a staging-only task — no source TypeScript changes; the registry + types come in the next iteration."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
