# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: paused
  pause_reason: "Fog Marsh swapped to Kenney Tiny Dungeon (colored dungeon pack). FLOOR [48,49,50,51] tan/grey stone, WALL [0,1,2] brown brick, EXIT [22] wooden door, props swapped to dungeon themes (barrels 66/67, crates 67, altars 69/70, candles 65, bones 68). Please `npm run dev`, walk Fog Marsh, report: (a) floor vs wall clearly distinguishable? (b) exit reads as door/threshold? (c) any specific frame that reads wrong — tell me the intent ('should be a skeleton' etc.) and I will swap the id. Ashen Isle untouched — still tiny-town. If we need to pick frames by id rather than guess, I will build tools/editor/frames.html (atlas at 4x with index labels)."

  # --- Task orchestration (owner: iterator) ---
  task_number: 20
  next_task: null
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
