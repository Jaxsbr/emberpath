# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: homecoming-light
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 7
  next_task: "[US-85] Implement warming-flag onFlagChange subscribers — adds two subscribers in GameScene.create() for `npc_warmed_wren` and `npc_warmed_old_man` that, on flip-to-true: (a) re-register the target NPC's tier-1 light at brighter values (e.g. radius +25%, intensity +0.15) via LightingSystem.registerLight idempotent overwrite (Learning #63), and (b) call this.maybeUpdateAlphaGates(true) to bloom alpha-gated decorations on the same tick (mirrors US-77's has_ember_mark subscriber pattern at GameScene.ts:358-366). Each subscriber's unsubscribe collected in a new this.warmingUnsubscribes: (() => void)[] field and invoked in cleanupResize (ASYNC-CLEANUP-SAFETY criterion). On flip-to-undefined (resetAllFlags), re-register the NPC light at ORIGINAL values to restore baseline. Brightening params live as named constants (WARMED_LIGHT_RADIUS_BONUS, WARMED_LIGHT_INTENSITY_BONUS) at the top of GameScene or in lightingConfig. This task is NO-ASSET-DEP and completes US-85 criteria 11 (light brightening) + 12 (alpha-gate bloom) + 5/13 of the [phase]-tagged Async-cleanup safety criteria. Verify build green. While this implements, poll Wren breathing-idle status — should complete during/after this task."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
