# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 14
  next_task: "[US-50] Editor prop rendering in tools/editor/src/mapRenderer.ts. Add a prop-drawing block AFTER exit zones and BEFORE NPCs (so props render under NPC discs, matching the game's depth order Tiles<Props<Entities). For each area.props entry, draw a filled circle at (col*CELL + CELL/2, row*CELL + CELL/2) with radius CELL/4 in color #c89b68 (warm tan — distinct from trigger palette and NPC colors), with a 0.5px black stroke. Push a clickable with data { type: 'prop', id, col, row, spriteFrame } so editor detail panel shows prop metadata. Then verify tools/editor build with `cd tools/editor && npm run build`."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
