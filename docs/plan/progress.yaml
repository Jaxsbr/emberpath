# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: world-legibility
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 5
  next_task: "[US-58] Implement editor mapRenderer decoration layer — render decoration sprites using actual atlas frames (criterion 'match what the game shows' rules out flat-color dots). Load both tileset atlases (tiny-town, tiny-dungeon) as HTMLImageElements at module init from the editor's publicDir-served paths (/tilesets/<id>/tilemap.png — confirmed editor's vite.config.ts mirrors game's publicDir at ../../assets). Use a module-level lastRender cache so when an atlas finishes loading after the first renderMap call, the editor automatically re-renders. In renderMap, after the base tile grid + grid lines and BEFORE trigger zones (so the decoration layer reads as part of the base map, not as an overlay annotation), iterate area.decorations and drawImage from the atlas's source rect (computed from frame index using cols=12, frameSize=16, srcX=(frame%12)*16, srcY=floor(frame/12)*16) into the editor cell at full CELL size. If atlas not yet loaded, skip this pass for this render — the onload handler will trigger a re-render. Add decorations to the clickables list with type:'decoration' so authors can inspect them in the detail panel. Verify cd tools/editor && npm run build succeeds; manually opening the editor on Ashen Isle (with empty decorations:[]) shows no decoration sprites and no errors; the actual rendering will be visible once US-59 fills in decorations. Props remain as colored dots (out of scope for this phase)."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
