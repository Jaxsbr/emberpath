# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: briar-wilds
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 12
  next_task: "[US-100/102/103] PixelLab Wang tileset generation for briar-wilds + style-matched object kinds. OPERATOR-DRIVEN against mcp__pixellab__ (personal — Learning EP-05). Tileset: primary 'briar-floor' / secondary 'briar-thorn'; subject + mood per phase-goal design direction. Object kinds: bramble-cluster (impassable), dead-tree (impassable), twisted-root (passable). Atlas frame-pick verification (Learning EP-03) lands with each commit. Once content is in, T13 wires the new atlasKey + object kinds + populates briar-wilds.ts with sparse thorn / decoration scatter and ashen-isle's bramble decoration cluster swaps from BUSH placeholder to the new bramble-cluster frame."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
