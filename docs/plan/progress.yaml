# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 3
  next_task: "[US-62] Implement saveState module + flags.ts atomic-reset wiring. (a) Create src/triggers/saveState.ts: STORAGE_KEY 'emberpath_save' (module-private); SaveState {version:1;areaId:string;position:{x:number;y:number}}; isValidSave type-guard (version===1, areaId in getAllAreaIds(), position.x/y Number.isFinite); loadSave (outer try/catch around getItem, inner try/catch around JSON.parse calling clearSave+warn-once-style on parse fail, validation branch calling clearSave+warn on shape fail, returns SaveState | null); writeSave (try/catch + module-level writeFailureLogged once-per-session flag); clearSave (try/catch around removeItem; idempotent); hasSave (=== loadSave() !== null); resetWorld (clearSave THEN resetAllFlags). (b) Edit src/triggers/flags.ts: add resetAllFlags-internal clearSave call (atomic per US-62); re-export resetWorld from saveState (US-65 backward-compat). Verify (npx tsc --noEmit && npm run build) passes."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62]
