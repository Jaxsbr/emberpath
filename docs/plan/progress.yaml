# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: npc-portraits
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 2
  next_task: "[US-56] Investigate: read src/systems/npcSprites.ts (current NPC_SPRITES shape, exports), src/data/areas/types.ts (DialogueScript + DialogueNode declarations), src/scenes/GameScene.ts (preload iteration over NPC_SPRITES + create/registerAnimations pattern), src/systems/dialogue.ts (UI-element ownership lifecycle). Output the precise diff plan for the next US-56 implement task: (a) copy portrait source files to assets/npc/<id>/portrait.png; (b) add portrait registry (NPC_PORTRAITS or extend NPC_SPRITES) with per-id { file, filter } and 'square aspect' inline comment; (c) add optional portraitId?: string to DialogueScript and DialogueNode in types.ts; (d) wire portraitId on Old Man and Marsh Hermit dialogue scripts; (e) confirm Whispering Stones script remains portrait-less."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
