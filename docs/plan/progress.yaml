# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: homecoming-light
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 6
  next_task: "[US-82+US-83] Kick off PixelLab template animations + portrait gens for Wren and Driftwood. Both characters' 8-direction rotations are ready (Wren=27194dce 116×116, Driftwood=bba49891 100×100). Per the heron pattern: animate_character with template_animation_id='breathing-idle' (4 frames) and 'walking-4-frames' (4 frames) for each character — 4 jobs total, 1 generation per direction × 8 dirs × 2 anims × 2 chars = 32 generations. Separately, fire two new create_character calls in standard mode for portraits (n_directions=4, size=96-ish to land at ~136×136 canvas; 'head and shoulders close-up portrait' prompts mirroring heron's portrait prompt structure) — 2 generations. Total spend this iteration: ~34 generations. Capture portrait character IDs in the log."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
