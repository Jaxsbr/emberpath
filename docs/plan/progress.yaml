# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: npc-portraits
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 7
  next_task: "[US-56] In src/scenes/GameScene.ts: import NPC_PORTRAITS + getNpcPortraitIds from '../systems/npcSprites'. Add a portrait-load loop after the existing NPC sprite preload block (after line 91): for each id in getNpcPortraitIds(), this.load.image('npc-portrait-<id>', `npc/<id>/<def.file>`). After the loops, register `this.load.once('complete', ...)` which iterates NPC_PORTRAITS and calls `this.textures.get('npc-portrait-<id>').setFilter(Phaser.Textures.FilterMode.LINEAR)` ONLY for entries with filter: 'linear' — entries with filter: 'nearest' inherit the global pixelArt: true default and need no per-texture override."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
