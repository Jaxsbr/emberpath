# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: homecoming-light
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 4
  next_task: "[US-85] Investigate: EmberShareSystem integration points — read src/scenes/GameScene.ts for the update() world-walk early-return pattern (transitionInProgress / spawnInProgress / dialogueSystem.isActive — exact line refs, locations of suppression branches), src/systems/npcInteraction.ts for gating insertion, src/systems/triggerZone.ts for gating insertion, src/systems/dialogue.ts choice-handler entry point where a 'Share warmth' choice would invoke EmberShareSystem.startPulse. Read src/systems/lighting.ts:registerLight signature for the idempotent-overwrite contract (Learning #63 confirmation), and the existing maybeUpdateAlphaGates / alpha-gate force-eval entry point used by US-77 onFlagChange. Output: a precise diff plan for the next iteration's implement task on src/systems/emberShare.ts (new) + GameScene wiring + suppression hooks. While this investigation runs, Wren (char 27194dce) and Driftwood (char bba49891) PixelLab gens are processing in the background — poll + integrate after this investigation completes."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
