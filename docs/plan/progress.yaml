# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 5
  next_task: "[US-63] Investigate: GameScene update/transition/dialogue/story flow to produce a concrete diff plan for maybeAutosave + transition flush + dialogue close flush + StoryScene close flush. Identify (a) the END of the world-walk branch in update() (where maybeAutosave must call from, NOT inside dialogue/transition early-returns), (b) the destination-areaId + entryPoint pixel resolution inside transitionToArea (call writeSave BEFORE scene.restart), (c) the DialogueSystem.setOnEnd consumer location for the flush hook, (d) the StoryScene close hook location, (e) where named constants like TARGET_VISIBLE_TILES live (place SAVE_THROTTLE_MS=1000 and SAVE_MIN_DELTA_PX=2 alongside)."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62]
