# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 2
  next_task: "[US-62] Investigate: produce concrete diff plan for src/triggers/saveState.ts — SaveState type {version:1; areaId; position:{x,y}}; STORAGE_KEY 'emberpath_save'; loadSave try/catch + scrub-on-corrupt + version/areaId/finite-numerics validation consulting getAllAreaIds(); writeSave try/catch + module-private writeFailureLogged once-per-session warn flag; clearSave idempotent + try/catch; hasSave === loadSave-non-null; resetWorld order (clearSave THEN resetAllFlags); flags.ts edits (resetAllFlags calls clearSave; re-export resetWorld for backward compat at TitleScene call sites). Confirm: registry key === area.id for ashen-isle and fog-marsh (US-63 dep), and identify any existing direct localStorage uses outside flags.ts to flag as out-of-scope-violations."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
