# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: fog-marsh-dead-end
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 4
  next_task: "[US-67] Investigate: produce a concrete diff plan for exit closure + collision flip + flag-change detection. Read (a) src/scenes/GameScene.ts exit-resolution path — find where exit conditions are evaluated and where transition is initiated; confirm if the existing condition gate at GameScene.ts:525 (per save-resume task 4 notes) only skips the transition without flipping collision; (b) src/systems/collision.ts — collidesWithWall signature and how it consumes area.map; (c) src/triggers/flags.ts — pre-phase shape (no subscriber API yet); design a minimal onFlagChange(name, cb): unsubscribe API integrated into setFlag so listeners fire only when the value actually changes (Learning EP-01 — once per change, not per setFlag call), and the unsubscribe handle is returned for cleanup in scene shutdown. Plan the collision flip approach: prefer area.map in-place mutation at rows 22 cols 13-16 (cheapest, requires invalidating any cached collision state) OR a flag-aware overlay queried by collidesWithWall. Plan how the GameScene subscribes during create() and unsubscribes on shutdown. Confirm tools/editor flowRenderer renders the conditional exit and decide whether a one-line dashed-arrow or label is needed (US-67 criterion: 'if the visible treatment was missing, this story adds a one-line dashed-arrow or label'). One concern this iteration: NOT yet implementing US-68's decoration condition; the flag-change subscriber API designed here is shared but only the exit collision consumer is wired now."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
