# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: briar-wilds
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 5
  next_task: "[US-101] Implement visual binding: player ember overlay (GameScene.ts:663-665, Phaser.GameObjects.Arc with EMBER_RADIUS=6) lerps scale 1.0..N and alpha A..B between WARMTH_FLOOR and WARMTH_MAX; lighting overlay's player-light radius (LightingSystem.getPlayerRadius at lighting.ts:213) lerps between new LIGHTING_CONFIG.playerLightRadiusFloor and playerLightRadiusFull. Add LIGHTING_CONFIG fields: playerEmberRadiusFloor/Full, playerEmberAlphaFloor/Full, playerLightRadiusFloor/Full — explicit committed values, never undefined. EmberWarmthSystem exposes getCurrentWarmth() (already done) and the GameScene update path calls a tiny lerp helper to set scale+alpha; LightingSystem grows a setPlayerWarmth(w) input."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
