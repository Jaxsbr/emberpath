# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: world-legibility
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 3
  next_task: "[US-58] Implement decoration layer engine — single coherent commit: (1) src/data/areas/types.ts: add DecorationDefinition { col: number; row: number; spriteFrame: string } and required field decorations: DecorationDefinition[] on AreaDefinition (placed between props and triggers in declaration order); (2) src/data/areas/ashen-isle.ts and src/data/areas/fog-marsh.ts: add decorations: [] alongside props (no transitional state — required field must compile from the start, US-59/US-60 fill in content); (3) src/scenes/GameScene.ts: add private decorationSprites: Phaser.GameObjects.Sprite[] = []; field, add private renderDecorations() method mirroring renderProps shape (atlas check, per-decoration texture.has guard with console.warn naming (col,row) and missing frame, sprite at (col*TILE_SIZE,row*TILE_SIZE) origin (0,0) display size TILE_SIZE depth 2; add inline comment documenting out-of-bounds behaviour — decorations outside (mapCols,mapRows) render harmlessly off-grid since Phaser handles negative/oversized coords without error; no collision contribution); call renderDecorations() in create() between renderTileMap and renderProps; update setupCamera() uiCam.ignore() list to include this.decorationSprites; (4) leave AGENTS.md depth-map / behavior-rules / file-ownership updates for a separate [phase] task — those are tagged [phase] in done-when and not gated by US-58 itself"
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
