# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: paused
  pause_reason: "All structural criteria are met and every non-manual done-when box can be ticked. Remaining gate is browser-runtime verification: run `npm run dev`, inspect both areas, and tick the corresponding `- [ ]` boxes in `docs/plan/phase-goal.md` (the Behavior/reads-as sections). Working scratchpad + fix-it guidance: `docs/plan/tileset-manual-verify.md`. If any tile or prop reads wrong, edit indices in `src/maps/tilesets.ts` (FLOOR/WALL/EXIT) or the `spriteFrame` values in `src/data/areas/{ashen-isle,fog-marsh}.ts` — the registry + resolveFrame picker keeps fixes surgical. Resume with `/sabs:build-loop action=resume project=/Users/jacobusbrink/Jaxs/projects/emberpath` after ticking and the Phase Completion Gate will fire."

  # --- Task orchestration (owner: iterator) ---
  task_number: 17
  next_task: null
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
