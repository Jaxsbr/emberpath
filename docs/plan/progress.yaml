# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: briar-wilds
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 8
  next_task: "[US-100] Implement briar-wilds.ts skeleton + ashen-isle east-gated exit. Concrete plan: ashen-isle exit at (col 49, row 18) size 1x2 with condition 'has_ember_mark == true' destination 'briar-wilds' entryPoint (col 1, row 13). Conditional bramble decorations (4-6 tile-snapped) over the exit with condition 'has_ember_mark == false'. First-time thought trigger at (col 47, row 18) condition 'has_ember_mark == true && east_path_seen == false', setFlags { east_path_seen: true }, line: 'The brambles have parted. A road east.'. New file briar-wilds.ts: 32x26 grid (>=30x24 floor), tileset='briar-wilds-floor-thorn' (placeholder pointing to ashen-isle-grass-sand for now), terrain seeded all-grass placeholder pending real PixelLab content, west exit at (col 0, row 12) size 1x3 returning to ashen-isle entryPoint (col 48, row 18). 2 drain zones + 2 quiet zones (1 quiet acts as closing reflection at col 27, row 12 size 4x4 with narration sequence ending on Heart Bridge line + setFlags briar_wilds_complete). Register in registry.ts. Build green expected (placeholders). Real PixelLab tileset + objects land in tasks 9-11."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
