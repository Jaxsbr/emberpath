# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 6
  next_task: "[US-48/US-50] Investigate: grep all references to AreaDefinition in src/ and tools/editor/src/ to enumerate consumers; identify which will break when required fields `tileset: string` and `props: PropDefinition[]` are added. Draft diffs for: (a) src/data/areas/types.ts — add PropDefinition interface and the two required fields; (b) src/data/areas/ashen-isle.ts — set tileset: 'tiny-town', props: [] (to be filled later); (c) src/data/areas/fog-marsh.ts — set tileset: 'monochrome-rpg', props: []; (d) any editor-side tools/editor/src/* code that constructs or consumes AreaDefinition and may need the same additions or a default. Keep visual.floorColor/wallColor fields unchanged. Output: short findings summary in the progress log; next iteration applies the diffs."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
