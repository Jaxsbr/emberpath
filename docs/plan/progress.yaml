# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: world-legibility
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 6
  next_task: "[US-58] Update AGENTS.md to document the decoration layer — single coherent edit covering: (1) Depth map: insert a new row 'Decorations | 2 | main | Tile-snapped decoration sprites (paths, building walls, fences, water edges, doorways) — composed by area authors from atlas frames, no collision contribution' between the existing Tiles (0) and Props (3) rows. (2) Behavior rules: add a new 'Decorations (tile-snapped, non-blocking)' entry mirroring the existing 'Decorative props (non-blocking)' entry — describing AreaDefinition.decorations: DecorationDefinition[] of { col, row, spriteFrame } at depth 2, atlas-frame literal (no resolveFrame variant picking — fully deterministic), missing-frame warn-and-skip naming (col,row), zero collision contribution, out-of-bounds renders off-grid harmlessly, created once at area load (Learning EP-01). (3) File ownership rows: GameScene.ts row gets a phrase appended about renderDecorations() at depth 2 between renderTileMap and renderProps; types.ts row gets DecorationDefinition + AreaDefinition.decorations mentioned; ashen-isle.ts and fog-marsh.ts rows get a brief mention that decorations are co-located alongside props; tools/editor/src/mapRenderer.ts row gets the decoration sprite-from-atlas rendering pass mentioned. Verify both builds (game tsc+build, editor build) still pass after the doc-only edit. This satisfies the [US-58] depth-map criterion and the [phase] AGENTS.md criteria."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
