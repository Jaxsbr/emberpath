# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 11
  next_task: "[US-65] Investigate: produce concrete diff plan for URL-param reset (?reset=1 / ?clearSave=1 with history.replaceState) in TitleScene, manual-verify doc creation at docs/plan/save-resume-manual-verify.md, and AGENTS.md updates (Directory layout, File ownership rows for saveState/flags/TitleScene/GameScene, new Behavior rule 'Save / resume', new Controls 'Dev / testing' subsection). Confirm placement: URL parsing in TitleScene.create() BEFORE renderTitleLayout so the post-reset Title renders in no-save state on the same frame. Determine the order: parse search → branch (reset=1 / clearSave=1 / neither) → history.replaceState to drop the consumed param while preserving others → info log → renderTitleLayout."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62, US-63, US-64]
