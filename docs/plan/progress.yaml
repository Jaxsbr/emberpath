# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tile-architecture
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 13
  next_task: "[US-98] Re-author Ashen Isle + Fog Marsh on the new vertex+object model + marsh-trap terrain-flip. Architectural scaffolding remaining: (1) per-cell tileset selection in the Wang resolver so cells with mixed terrains pick the matching tileset (currently area.tileset is single, blocking multi-pair authoring); (2) GameScene.applyConditionalTerrain method that mutates area.terrain on flag change for the marsh-trap closure; (3) conditionalTerrain block on fog-marsh declaring path↔water at row 22 cols 13-16. Content-side re-author (paint vertex grids, place objects via the new editor in tools/editor, remove decorations that became objects, delete tiny-town/tiny-dungeon atlas dirs + TILESETS entries + decorationsTileset field) is operator-driven creative work — recommended path: open the editor, paint each area, click Export TypeScript, paste into the area files."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
