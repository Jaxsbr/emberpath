# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 6
  next_task: "[US-63] Implement autosave hooks in GameScene. (a) Import writeSave from '../triggers/saveState'. (b) Add module-level SAVE_THROTTLE_MS=1000, SAVE_MIN_DELTA_PX=2 alongside FADE_DURATION. (c) Add private fields lastSaveTime/lastSaveX/lastSaveY. (d) Add private maybeAutosave() — returns early on transitionInProgress, dialogue active, elapsed<THROTTLE, |delta|<MIN_DELTA — otherwise writeSave({version:1, areaId:this.area.id, position:{x,y}}) and update bookkeeping. (e) Add private flushSave() — unconditional write with transitionInProgress safety guard, updates bookkeeping. (f) update() line 252 calls this.maybeAutosave() at end of world-walk branch. (g) transitionToArea inserts a flush of the DESTINATION payload between transitionInProgress=true and fadeOut, computing destX/destY via the same pixel formula as createPlayer. (h) dialogueSystem.setOnEnd callback appends this.flushSave(). (i) create() registers this.events.on('resume', this.flushSave, this); cleanupResize() removes it. Verify: npx tsc --noEmit && npm run build passes; cd tools/editor && npm run build passes (editor unaffected)."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62]
