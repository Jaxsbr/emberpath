# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: save-resume
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 14
  next_task: "[US-65, phase] AGENTS.md reconciliation — final phase update batched in one commit: (a) Directory layout: add `triggers/saveState.ts` line under `triggers/` and `save-resume-manual-verify.md` under `docs/plan/`. (b) File ownership: new row for `triggers/saveState.ts`; updated rows for `triggers/flags.ts` (atomic clear via resetAllFlags + once-per-session warn parity), `scenes/TitleScene.ts` (Continue/New Game branching + URL-param reset + renderTitleLayout re-render on Reset), `scenes/GameScene.ts` (maybeAutosave + transition flush + dialogue close flush + StoryScene close flush + resumePosition boot field with entryPoint-wins precedence + lastSaveX/Y bookkeeping seeded in createPlayer). (c) Behavior rules: new 'Save / resume' bullet (throttle constants 1000ms / 2px; three trigger points; atomic reset; Continue precedence; URL-param reset). (d) Controls: new 'Dev / testing' subsection for ?reset=1 and ?clearSave=1. After commit, tick all remaining [US-65] + [phase] boxes; check Story Completion Gate for US-65 + Phase Completion Gate."

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-62, US-63, US-64]
