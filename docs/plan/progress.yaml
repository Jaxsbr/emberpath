# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: briar-wilds
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 7
  next_task: "[US-100] Investigate: catalogue exact ashen-isle.ts east-edge available cells for the new exit (current map is 50x38; need a passable cell on/near col 49 with a clear approach); identify the conditional-decoration mechanism so brambles can be authored with `condition: 'has_ember_mark == false'` over the exit tiles; pick a (col, row) pair for both the exit and the closing-reflection trigger placement; sketch the briar-wilds.ts area shape (≥30x24 vertex grid) including west-edge return exit + closing-reflection quiet zone location near far edge. NO PixelLab calls in this investigate task — those land in the implement task with a clear prompt."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
