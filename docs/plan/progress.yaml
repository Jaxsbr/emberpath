# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: npc-behavior
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 1
  next_task: "[US-52] Investigate: enumerate staged NPC assets at /Users/jacobusbrink/Jaxs/assets/emberpath/npc/{marsh-hermit,old-man}/{idle,walk,static}/ (file counts per dir; confirm idle/walk frames named frame_000..003.png in 8 direction subfolders and static as 8 single <dir>.png files). Audit existing NpcDefinition consumers in src/ and tools/editor/src/ and draft the types.ts diff adding `sprite: string`, `wanderRadius: number`, `awarenessRadius: number` (retain `color`). Review fox-pip preload + animation registration pattern in src/scenes/GameScene.ts so the NPC sprite registry (src/systems/npcSprites.ts) mirrors it. Enumerate all direction-from-vector sites in src/ (any Math.atan2 / octant table / direction-string derivation) per Learning #70 consumer audit, so octant extraction in the next task is informed."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
