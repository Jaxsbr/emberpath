# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: npc-behavior
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 3
  next_task: "[US-52] Extend NpcDefinition in src/data/areas/types.ts with required fields `sprite: string`, `wanderRadius: number`, `awarenessRadius: number` (keep `color` for editor map-overview). Update src/data/areas/ashen-isle.ts (old-man: sprite: 'old-man', wanderRadius: 2, awarenessRadius: 3) and src/data/areas/fog-marsh.ts (marsh-hermit: sprite: 'marsh-hermit', wanderRadius: 2, awarenessRadius: 3). Must compile together (required fields; areas won't typecheck otherwise). Verify tsc --noEmit && npm run build passes. Editor build not yet affected — tools/editor/src/mapRenderer.ts reads only npc.col/row/color which remain. One concern: add the data-model fields and fill them in both areas."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
