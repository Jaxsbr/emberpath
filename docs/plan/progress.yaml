# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: homecoming-light
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 8
  next_task: "[US-86] Implement cumulative desaturation derived value — no-asset-dep code work. Per spec: effectiveDesaturationStrength = base × (1 − 0.15 × warmingsCount) clamped ≥ 0.4, where warmingsCount = count of true warming flags (npc_warmed_wren, npc_warmed_old_man). The desaturation pipeline (src/systems/desaturationPipeline.ts) currently reads LIGHTING_CONFIG.desaturationStrength directly — refactor so it reads a derived value that is recomputed on warming-flag-change events ONLY (subscriber lives in GameScene; not per-frame, Learning EP-01). Approach options: (a) add LIGHTING_CONFIG.effectiveDesaturationStrength derived field updated by GameScene's warming subscriber; pipeline reads this. (b) GameScene calls pipeline.setDesaturationStrength(value) on warming-change events. Option (a) keeps the pipeline decoupled from GameScene; option (b) is cleaner separation. Choose (b). Add the third warming-related onFlagChange subscriber that recomputes warmingsCount and pushes the new effective value into the desat pipeline. Floor of 0.4 preserves Ashen Isle's faded identity. Reset Progress restores baseline (subscriber notified with value=undefined → recompute, count=0 → effective = base). Add to ASGENTS.md. Verify build green. Concurrent: Wren walking-4-frames is processing (~3 min); after this task, poll + queue Driftwood breathing-idle next."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-82, US-83, US-84, US-85, US-86]
