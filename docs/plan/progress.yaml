# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tileset
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 4
  next_task: "[US-49] Create src/maps/tilesets.ts — export TilesetRegistry with entries for tiny-town and monochrome-rpg using the frame indices from docs/plan/tileset-frame-analysis.md. Registry shape: Record<string, { atlasKey: string; tileFrames: Record<'FLOOR' | 'WALL' | 'EXIT', string[]> }>. Include resolveFrame(tilesetId, kind, col, row): string | null — pure deterministic variant picker keyed on (col, row, kind, tilesetId), no RNG, no per-frame recompute, logs a descriptive warning and returns null for unknown tilesetId/kind. Frame name format: 4-digit zero-padded index string (e.g. '0000', '0015', '0120') matching the numeric frame keys Phaser will assign to each spritesheet cell. Do NOT wire into GameScene yet — that is the next task."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
