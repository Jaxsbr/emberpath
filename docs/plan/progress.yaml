# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.
#
# Field ownership — each field has exactly one owner responsible for writes.
# Other commands may READ any field but must never WRITE fields they don't own.
#
#   Owner key:
#     init        = build-loop-init (scaffolding, one-time creation)
#     orchestrator = build-loop (dispatcher: resume, skip, abort, pause)
#     iterator    = build-loop-iterate (continuous loop: start, iterate)
#     retro       = phase-retro (retrospective gate)
#
# See MANUAL.md § State ownership for the full ownership table.

config:
  verify: "npx tsc --noEmit && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 12
    builds: [12, 13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: tile-architecture
  phase_complete: true
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 14
  next_task: "[US-98] OPERATOR-DRIVEN: hand-paint both areas via the new editor. Architectural pieces are landed (per-cell tileset selection, applyConditionalTerrain + marsh-trap terrain-flip block, closure decorations removed). Remaining: (a) open tools/editor, paint Ashen Isle terrain + place objects, Export TypeScript, paste into ashen-isle.ts replacing the derived terrain/objects (and remove the now-redundant Kenney decorations); (b) same for Fog Marsh; (c) in-engine smoke at desktop ~1280×720 + mobile DevTools 360×640; (d) save-state + Reset Progress smoke. Once content authoring is complete, the agent can remove tiny-town/tiny-dungeon TILESETS entries + asset dirs + decorationsTileset field + the degenerate-mode warning Set."
  last_result: pass
  consecutive_fails: 0
  phase_classification: cross-cutting

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: true

  # --- Tracking (owner: iterator) ---
  completed_stories: [US-92, US-93, US-94, US-95, US-96, US-97, US-98]
