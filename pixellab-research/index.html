<!DOCTYPE html>
<html>
<head>
<title>Ember Fox — Sprite Comparison</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: system-ui; margin: 2rem; }
  h1 { text-align: center; color: #f0a040; }
  table { margin: 2rem auto; border-collapse: collapse; }
  th { padding: 0.5rem 2rem; font-size: 1.1rem; color: #ccc; }
  td { padding: 1rem 2rem; text-align: center; }
  td img { width: 204px; height: 204px; image-rendering: pixelated; background: #2a2a4a; border: 2px solid #333; border-radius: 4px; }
  .dir { color: #f0a040; font-weight: bold; font-size: 1rem; }
</style>
</head>
<body>
<h1>Ember Fox — Sprite Comparison</h1>
<table>
  <tr>
    <th></th>
    <th>Cat Template</th>
    <th>Dog Template</th>
  </tr>
  <tr>
    <td class="dir">South</td>
    <td><img src="cat/south.png"></td>
    <td><img src="dog/south.png"></td>
  </tr>
  <tr>
    <td class="dir">East</td>
    <td><img src="cat/east.png"></td>
    <td><img src="dog/east.png"></td>
  </tr>
  <tr>
    <td class="dir">North</td>
    <td><img src="cat/north.png"></td>
    <td><img src="dog/north.png"></td>
  </tr>
  <tr>
    <td class="dir">West</td>
    <td><img src="cat/west.png"></td>
    <td><img src="dog/west.png"></td>
  </tr>
</table>
</body>
</html>
